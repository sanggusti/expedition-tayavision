dataset_path: ByteDance/MTVQA
dataset_name: null
test_split: test
output_type: generate_until
doc_to_text: !function utils.mtvqa_blind_doc_to_text
doc_to_target: !function utils.mtvqa_blind_doc_to_target
process_results: !function utils.mtvqa_blind_process_results
generation_kwargs:
  until:
    - "\n"
    - "<|END_OF_TURN_TOKEN|>"
  temperature: 0.0
  do_sample: false
  max_gen_toks: 64
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0
