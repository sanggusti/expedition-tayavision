name: CI/CD to Modal

on:
    issue_comment:
        types: [created]

jobs:
    deploy:
        name: Deploy
        if: >
            github.event.issue.pull_request &&
            startsWith(github.event.comment.body, '/run ')
        runs-on: ubuntu-latest
        env:
            MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
            MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

        steps:
            - name: Parse modal script from comment
              id: parse
              uses: actions/github-script@v7
              with:
                  script: |
                      const body = context.payload.comment.body.trim();
                      const match = body.match(/^\/run\s+(scripts\/modal_[\w]+\.py)$/);
                      if (!match) {
                        core.setFailed(
                          `Invalid command. Usage: \`/run scripts/modal_<name>.py\`\n` +
                          `Example: \`/run scripts/modal_train_alignment.py\``
                        );
                        return;
                      }
                      const scriptPath = match[1];
                      // convert scripts/modal_train_alignment.py -> scripts.modal_train_alignment
                      const modulePath = scriptPath.replace(/\//g, '.').replace(/\.py$/, '');
                      core.setOutput('script', scriptPath);
                      core.setOutput('module', modulePath);

            - name: React to comment
              uses: actions/github-script@v7
              with:
                  script: |
                      await github.rest.reactions.createForIssueComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        comment_id: context.payload.comment.id,
                        content: 'rocket'
                      });

            - name: Post running status
              id: running-comment
              uses: actions/github-script@v7
              with:
                  script: |
                      const { data: comment } = await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.issue.number,
                        body: '⏳ **Running** `${{ steps.parse.outputs.script }}`...'
                      });
                      return comment.id;
                  result-encoding: string

            - name: Checkout PR branch
              uses: actions/checkout@v6
              with:
                  ref: refs/pull/${{ github.event.issue.number }}/merge

            - name: Verify script exists
              run: |
                  if [ ! -f "${{ steps.parse.outputs.script }}" ]; then
                    echo "::error::Script ${{ steps.parse.outputs.script }} not found in repo"
                    exit 1
                  fi

            - name: Install Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install Modal
              run: |
                  python -m pip install --upgrade pip
                  pip install modal

            - name: Run job
              run: |
                  modal run -m ${{ steps.parse.outputs.module }}

            - name: Post done status
              if: success()
              uses: actions/github-script@v7
              with:
                  script: |
                      await github.rest.issues.updateComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        comment_id: ${{ steps.running-comment.outputs.result }},
                        body: '✅ **Done** — `${{ steps.parse.outputs.script }}` completed successfully.'
                      });

            - name: Post failure status
              if: failure()
              uses: actions/github-script@v7
              with:
                  script: |
                      await github.rest.issues.updateComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        comment_id: ${{ steps.running-comment.outputs.result }},
                        body: '❌ **Failed** — `${{ steps.parse.outputs.script }}` failed. Check the [run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).'
                      });
